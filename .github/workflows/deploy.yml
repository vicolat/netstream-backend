name: NetStream CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.NETSTREAM_EC2_HOST }}
          username: ${{ secrets.NETSTREAM_EC2_USER }}
          key: ${{ secrets.NETSTREAM_EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/netstream-deploy/netstream-fullstack
            git pull origin main
            ./deploy.sh