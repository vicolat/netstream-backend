name: Frontend CI/CD

on:
  push:
    branches: ["main"]

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Frontend Image
        run: docker build -t frontend ./Frontend

      # ✅ FIX: Ensure repo is not empty
      - name: Tag Frontend Image
        run: |
          if [ -z "${{ secrets.ECR_FRONTEND_REPO }}" ]; then
            echo "ECR_FRONTEND_REPO is missing"
            exit 1
          fi

          docker tag frontend:latest \
          ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_FRONTEND_REPO }}:latest

      - name: Push Frontend Image
        run: |
          docker push \
          ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_FRONTEND_REPO }}:latest

      - name: Deploy Frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ${{ secrets.EC2_FRONTEND_USER }}
          key: ${{ secrets.EC2_FRONTEND_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
            | docker login --username AWS --password-stdin \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            docker pull \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_FRONTEND_REPO }}:latest

            docker stop frontend || true
            docker rm frontend || true

            docker run -d --restart always -p 80:3000 --name frontend \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_FRONTEND_REPO }}:latest