name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. Checkout Code
      # =========================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================
      # 2. Setup Java (IMPORTANT)
      # =========================
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # =========================
      # 3. BUILD SPRING BOOT APP
      # =========================
      - name: Build Backend (Maven)
        run: mvn clean package -DskipTests -f Backend/pom.xml

      # =========================
      # 4. AWS AUTH
      # =========================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # =========================
      # 5. LOGIN TO ECR
      # =========================
      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # =========================
      # 6. BUILD DOCKER IMAGE
      # =========================
      - name: Build Docker Image
        run: docker build -t backend ./Backend

      # =========================
      # 7. TAG IMAGE
      # =========================
      - name: Tag Image
        run: |
          docker tag backend:latest ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_BACKEND_REPO }}:latest

      # =========================
      # 8. PUSH IMAGE TO ECR
      # =========================
      - name: Push Image
        run: |
          docker push ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_BACKEND_REPO }}:latest

      # =========================
      # 9. DEPLOY TO EC2 (FIXED)
      # =========================
      - name: Deploy Backend to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_BACKEND_HOST }}
          username: ${{ secrets.EC2_BACKEND_USER }}
          key: ${{ secrets.EC2_BACKEND_SSH_KEY }}

          # IMPORTANT: pass ALL variables properly
          envs: AWS_REGION,AWS_ACCOUNT_ID,ECR_BACKEND_REPO,MONGODB_URI

          script: |
            echo "=============================="
            echo "Starting Backend Deployment"
            echo "=============================="

            # Validate variables (prevents broken URL issue)
            if [ -z "$AWS_ACCOUNT_ID" ]; then
              echo "ERROR: AWS_ACCOUNT_ID is missing"
              exit 1
            fi

            if [ -z "$AWS_REGION" ]; then
              echo "ERROR: AWS_REGION is missing"
              exit 1
            fi

            if [ -z "$ECR_BACKEND_REPO" ]; then
              echo "ERROR: ECR_BACKEND_REPO is missing"
              exit 1
            fi

            echo "Logging into ECR..."
            aws ecr get-login-password --region $AWS_REGION \
            | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

            echo "Pulling latest backend image..."
            docker pull $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_BACKEND_REPO:latest || true

            echo "Stopping old container..."
            docker stop backend || true
            docker rm backend || true

            echo "Starting new backend container..."
            docker run -d \
              -p 8080:8080 \
              --name backend \
              --restart always \
              -e MONGODB_URI="$MONGODB_URI" \
              $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_BACKEND_REPO:latest

            echo "Backend deployed successfully!"