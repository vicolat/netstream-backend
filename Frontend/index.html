<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NetStream Movies</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

h1 {
    text-align: center;
    color: yellow;
    padding: 10px;
}

.form {
    text-align: center;
    margin: 20px;
}

input {
    padding: 10px;
    margin: 5px;
}

button {
    padding: 10px 15px;
    background: yellow;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

#result {
    text-align: center;
    margin-top: 10px;
}

/* GRID */
#movieList {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* CARD */
.card {
    background: black;
    border: 1px solid yellow;
    color: yellow;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.6);
    transition: transform 0.3s ease;
    cursor: pointer;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-bottom: 1px solid yellow;
}

.card-content {
    padding: 10px;
}

.card-content h3 {
    margin: 0;
    font-size: 18px;
    color: yellow;
}

.card-content p {
    margin: 5px 0 0;
    font-size: 14px;
    color: white;
}
</style>
</head>

<body>

<h1>NETSTREAM MOVIES</h1>

<div class="form">
    <input id="title" placeholder="Movie Title">
    <input id="genre" placeholder="Genre">
    <input id="trailerUrl" placeholder="YouTube Trailer URL">
    <button onclick="addMovie()">Add Movie</button>
    <button onclick="getMovies()">Load Movies</button>

    <p id="result"></p>
</div>

<div id="movieList"></div>

<script src="app.js"></script>

</body>
</html>
